  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#1a1613"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Citation network nodes (decorative) -->
  <!-- Connecting arcs -->
  <path d="M820 200 Q900 280 950 250" stroke="#c6880e" stroke-opacity="0.2" stroke-width="1.5" fill="none"/>
  <path d="M820 200 Q860 340 980 350" stroke="#c6880e" stroke-opacity="0.15" stroke-width="1" fill="none"/>
  <path d="M950 250 Q1020 300 980 350" stroke="#c6880e" stroke-opacity="0.18" stroke-width="1" fill="none"/>
  <path d="M820 200 Q780 150 800 100" stroke="#c6880e" stroke-opacity="0.12" stroke-width="1" fill="none"/>
  <path d="M950 250 Q1050 200 1080 240" stroke="#c6880e" stroke-opacity="0.12" stroke-width="1" fill="none"/>
  <path d="M870 270 Q900 230 950 250" stroke="#c6880e" stroke-opacity="0.25" stroke-width="1.5" fill="none"/>

  <!-- Outer nodes -->
  <circle cx="800" cy="100" r="5" fill="#c6880e" opacity="0.3"/>
  <circle cx="1080" cy="240" r="6" fill="#c6880e" opacity="0.25"/>
  <circle cx="980" cy="350" r="7" fill="#c6880e" opacity="0.28"/>
  <circle cx="750" cy="320" r="4" fill="#c6880e" opacity="0.18"/>

  <!-- Secondary nodes -->
  <circle cx="820" cy="200" r="12" fill="#c6880e" opacity="0.08"/>
  <circle cx="820" cy="200" r="5" fill="#c6880e" opacity="0.45"/>

  <circle cx="870" cy="270" r="10" fill="#c6880e" opacity="0.06"/>
  <circle cx="870" cy="270" r="4" fill="#c6880e" opacity="0.4"/>

  <!-- Primary node -->
  <circle cx="950" cy="250" r="32" fill="#c6880e" opacity="0.05"/>
  <circle cx="950" cy="250" r="20" fill="#c6880e" opacity="0.1"/>
  <circle cx="950" cy="250" r="11" fill="#c6880e" opacity="0.2"/>
  <circle cx="950" cy="250" r="6" fill="#c6880e" opacity="0.8"/>

  <!-- Platform labels near nodes -->
  <text x="778" y="94" fill="#e8d5b5" opacity="0.4" font-size="11" font-family="system-ui, sans-serif">ChatGPT</text>
  <text x="1060" y="235" fill="#e8d5b5" opacity="0.35" font-size="11" font-family="system-ui, sans-serif">Perplexity</text>
  <text x="960" y="372" fill="#e8d5b5" opacity="0.35" font-size="11" font-family="system-ui, sans-serif">Gemini</text>
  <text x="793" y="220" fill="#e8d5b5" opacity="0.35" font-size="10" font-family="system-ui, sans-serif">Claude</text>
  <text x="843" y="290" fill="#e8d5b5" opacity="0.32" font-size="9" font-family="system-ui, sans-serif">AI Overview</text>
  <text x="925" y="280" fill="#c6880e" opacity="0.85" font-size="12" font-weight="600" font-family="system-ui, sans-serif">Your Brand</text>

