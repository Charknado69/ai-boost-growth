<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#c6880e" stop-opacity="0.15"/>
      <stop offset="60%" stop-color="#c6880e" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#1a1613" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="amber-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c6880e" stop-opacity="0"/>
      <stop offset="50%" stop-color="#c6880e" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#c6880e" stop-opacity="0"/>
