<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#141210"/>

  <!-- Subtle warm vignette -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="0%" stop-color="#1C1915"/>
    <stop offset="100%" stop-color="#0D0B09"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#vignette)"/>

  <!-- Ambient amber glow — top right -->
  <radialGradient id="glow" cx="75%" cy="30%" r="45%">
    <stop offset="0%" stop-color="#D4960A" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#D4960A" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Citation network — abstract nodes (right side) -->
  <path d="M820 180 Q920 140 1010 200" stroke="#D4960A" stroke-opacity="0.25" stroke-width="1.5"/>
  <path d="M820 180 Q870 280 960 310" stroke="#D4960A" stroke-opacity="0.18" stroke-width="1"/>
  <path d="M1010 200 Q1060 260 960 310" stroke="#D4960A" stroke-opacity="0.20" stroke-width="1"/>
  <path d="M1010 200 Q1080 170 1100 230" stroke="#D4960A" stroke-opacity="0.15" stroke-width="1"/>
  <path d="M900 250 Q920 310 960 310" stroke="#D4960A" stroke-opacity="0.15" stroke-width="1"/>

  <!-- Outer nodes -->
  <circle cx="1100" cy="230" r="6" fill="#D4960A" fill-opacity="0.30"/>
  <circle cx="960" cy="310" r="8" fill="#D4960A" fill-opacity="0.35"/>
  <circle cx="820" cy="180" r="7" fill="#D4960A" fill-opacity="0.32"/>

  <!-- Secondary node -->
  <circle cx="900" cy="250" r="14" fill="#D4960A" fill-opacity="0.08"/>
  <circle cx="900" cy="250" r="6" fill="#D4960A" fill-opacity="0.50"/>

  <!-- Primary node — Your Brand -->
  <circle cx="1010" cy="200" r="32" fill="#D4960A" fill-opacity="0.07"/>
  <circle cx="1010" cy="200" r="20" fill="#D4960A" fill-opacity="0.14"/>
  <circle cx="1010" cy="200" r="10" fill="#D4960A" fill-opacity="0.85"/>

  <!-- Platform labels -->
  <text x="800" y="176" fill="#F5F0E8" fill-opacity="0.40" font-size="13" font-family="Georgia, serif">ChatGPT</text>
  <text x="1108" y="226" fill="#F5F0E8" fill-opacity="0.38" font-size="12" font-family="Georgia, serif">Perplexity</text>
  <text x="938" y="334" fill="#F5F0E8" fill-opacity="0.38" font-size="12" font-family="Georgia, serif">Gemini</text>
  <text x="862" y="268" fill="#F5F0E8" fill-opacity="0.36" font-size="12" font-family="Georgia, serif">Claude</text>
  <text x="986" y="246" fill="#D4960A" fill-opacity="0.90" font-size="12" font-weight="600" font-family="Georgia, serif">Your Brand</text>

  <!-- Amber top accent line -->
  <line x1="80" y1="72" x2="280" y2="72" stroke="#D4960A" stroke-opacity="0.50" stroke-width="1"/>

  <!-- Logo — Vyzora. -->
  <text x="80" y="130" fill="#F5F0E8" font-size="64" font-family="Georgia, 'Times New Roman', serif" font-weight="400" letter-spacing="-1">Vyzora</text>
  <text x="330" y="130" fill="#D4960A" font-size="64" font-family="Georgia, 'Times New Roman', serif">.</text>

  <!-- Headline -->
  <text x="80" y="220" fill="#F5F0E8" fill-opacity="0.95" font-size="38" font-family="Georgia, 'Times New Roman', serif" font-weight="400" letter-spacing="-0.5">Your customers ask AI what to buy.</text>
  <text x="80" y="272" fill="#D4960A" font-size="38" font-family="Georgia, 'Times New Roman', serif" font-style="italic">Make sure your brand is the answer.</text>

  <!-- Divider -->
  <line x1="80" y1="316" x2="520" y2="316" stroke="#F5F0E8" stroke-opacity="0.12" stroke-width="1"/>

  <!-- Subline -->
  <text x="80" y="356" fill="#F5F0E8" fill-opacity="0.50" font-size="20" font-family="Georgia, serif" letter-spacing="0.5">AEO &amp; GEO Optimisation Agency</text>

  <!-- Bottom trust signals -->
  <text x="80" y="540" fill="#F5F0E8" fill-opacity="0.35" font-size="16" font-family="Arial, sans-serif" letter-spacing="1">FREE AUDIT  ·  48-HOUR DELIVERY  ·  NO COMMITMENT</text>

  <!-- Bottom amber line -->
  <line x1="80" y1="568" x2="1120" y2="568" stroke="#D4960A" stroke-opacity="0.20" stroke-width="1"/>

  <!-- Domain -->
  <text x="80" y="598" fill="#D4960A" fill-opacity="0.60" font-size="15" font-family="Arial, sans-serif" letter-spacing="1">VYZORA.AI</text>
</svg>
