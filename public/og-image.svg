  <!-- Stats -->
  <text x="80" y="510" fill="#c6880e" font-size="28" font-family="Georgia, serif">64%</text>
  <text x="155" y="510" fill="#e8d5b5" opacity="0.45" font-size="13" font-family="system-ui, sans-serif">act on AI recommendations</text>

  <text x="420" y="510" fill="#c6880e" font-size="28" font-family="Georgia, serif">35%</text>
  <text x="487" y="510" fill="#e8d5b5" opacity="0.45" font-size="13" font-family="system-ui, sans-serif">more clicks for cited brands</text>

